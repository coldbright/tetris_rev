<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby</title>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    /* TOP BAR */
    .top_bar {
      height: 60px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
    }

    .login {
      background: #6366f1;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* MAIN */
    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* LEFT */
    .game_screen {
      width: 50%;
      background: linear-gradient(to bottom left, #122740, #090a42);
      position: relative;
      overflow: hidden;
    }

    /* RIGHT */
    .lobby_panel {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lobby_box {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      width: 300px;
      text-align: center;
    }

    .lobby_box h1 {
      margin-bottom: 20px;
    }

    /* INPUT */
    input {
      width: 94%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #4f46e5;
    }

    /* FALLING BLOCK */
    .falling-item {
      position: absolute;
      font-size: 24px; /* 안 보일 수 있어서 추가 */
      animation: fall 4s linear forwards;
    }

    @keyframes fall {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(100%);
      }
    }
  </style>
</head>

<body>

<div class="top_bar">
  <div class="login" id="loginBtn" onclick="click_login()">Login</div>
  <div id="profileBtn" style="display:none;">
    👤 <span id="username"></span>
<!--    <button onclick="logout()" style="margin-left:10px;">Logout</button>-->
  </div>
</div>

<div class="container">

  <div class="game_screen"></div>

  <div class="lobby_panel">
    <div class="lobby_box">
      <h1>TETRIS</h1>

      <p id="userText">로그인이 필요합니다</p>

      <input type="text" id="roomInput" maxlength="4" placeholder="방 코드 입력">

      <button onclick="joinRoom()">방 입장</button>
      <button onclick="createRoom()">방 만들기</button>

    </div>
  </div>

</div>

<script>
  // ================= 로그인 처리 =================
  const token = localStorage.getItem('token');
  const loginBtn = document.getElementById('loginBtn');
  const profileBtn = document.getElementById('profileBtn');
  const usernameSpan = document.getElementById('username');
  const userText = document.getElementById('userText');

  if (token) {
    const user = parseJwt(token);
    if (user && user.username) {
      // 버튼을 Logout으로 변경
      loginBtn.textContent = "Logout";

      // 유저 표시
      usernameSpan.textContent = user.username;
      profileBtn.style.display = "block";
      userText.textContent = user.username + "님 환영합니다";

      // 🔥 클릭 이벤트 변경
      loginBtn.onclick = function () {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("token");
          location.reload();
        }
      };
    }
  }

  function click_login() {
    window.location.href = 'login';
  }

  function logout() {
    if (confirm("로그아웃 하시겠습니까?")) {
      localStorage.removeItem("token");
      location.reload();
    }
  }

  // ================= SOCKET =================
  const socket = io({
    auth: { token }
  });

  // ================= 방 입장 =================
  function joinRoom() {
    if (!token) {
      alert("로그인이 필요합니다.");
      location.href = "/login";
      return;
    }
    const code = document.getElementById("roomInput").value.trim();

    if (code.length === 4) {
      location.href = `/room=${code}`;
    } else {
      alert("4자리 입력");
    }
  }

  // ================= 방 생성 =================
  function createRoom() {
    if (!token) {
      alert("로그인이 필요합니다.");
      location.href = "/login";
      return;
    }
    const code = Math.random().toString(36).substring(2,6).toUpperCase();
    location.href = `/room=${code}`;
  }

  // ================= JWT =================
  function parseJwt(token) {
    try {
      return JSON.parse(atob(token.split('.')[1]));
    } catch {
      return null;
    }
  }

  // ================= 테트리스 애니메이션 =================
  function createFallingItem() {
    const item = document.createElement("div");
    item.classList.add("falling-item");

    // 🔥 위치 지정
    item.style.left = Math.random() * 90 + "%";
    item.style.top = "-50px"; // 위에서 시작

    item.innerHTML = "🟦";

    document.querySelector(".game_screen").appendChild(item);

    setTimeout(() => item.remove(), 4000);
  }

  setInterval(createFallingItem, 300);
</script>

</body>
</html>
